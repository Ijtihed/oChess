name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ochess-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ochess-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  type-check:
    name: Type Check (future TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ochess-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ochess-app/package-lock.json
      - run: npm ci
      - name: Check for tsconfig
        id: ts
        run: test -f tsconfig.json && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"
      - name: Run tsc
        if: steps.ts.outputs.exists == 'true'
        run: npx tsc --noEmit
